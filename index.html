<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiking Logs - Precision Mode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; }
        .modal { display: none; position: fixed; z-index: 50; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-active { display: flex; align-items: center; justify-content: center; }
        .filter-btn.active { background-color: #10b981; color: white; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-2xl mx-auto py-12 px-6">
        <header class="mb-8 border-l-4 border-emerald-500 pl-6">
            <h1 class="text-4xl font-black tracking-tight text-white">山系記錄</h1>
            <p class="text-slate-400 mt-2 font-medium">個人登山軌跡資料庫</p>
        </header>

        <div id="filter-container" class="flex flex-wrap gap-2 mb-10">
            <button onclick="filterRecords('全部')" class="filter-btn active px-4 py-2 rounded-full bg-slate-800 text-slate-300 text-sm font-bold border border-slate-700 transition all hover:border-emerald-500">全部</button>
        </div>
        
        <div id="loading" class="text-center py-20 text-slate-500 animate-pulse">定位欄位資料中...</div>
        <div id="record-container" class="space-y-10"></div>
    </div>

    <div id="detail-modal" class="modal p-4" onclick="closeModal()">
        <div class="bg-slate-800 rounded-3xl max-w-md w-full p-8 shadow-2xl relative border border-slate-700" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-5 right-5 text-slate-500 hover:text-white text-3xl transition">&times;</button>
            <h2 id="modal-title" class="text-2xl font-bold text-emerald-400 border-b border-slate-700 pb-5 mb-6"></h2>
            <div id="modal-body" class="space-y-5 text-sm"></div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRssVI_ETyZAWp_ZzR6NSQr49bPhLajgVl83G1PWP2Ytb7axuYZQEtNf9NgpfJijFRQfdauQnulc0fS/pub?output=csv';
        let allData = [];
        let colMap = {}; // 用於儲存欄位名稱與索引的對應關係

        Papa.parse(csvUrl, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                const headerRow = results.data[0];
                // 自動建立欄位映射表，例如 colMap["人員"] = 3
                headerRow.forEach((colName, index) => {
                    if (colName) colMap[colName.trim()] = index;
                });

                allData = results.data.slice(1);
                initFilters(allData);
                renderData(allData);
                document.getElementById('loading').remove();
            }
        });

        function initFilters(data) {
            const catIdx = colMap["分類"];
            const categories = new Set();
            data.forEach(row => { if(row[catIdx]) categories.add(row[catIdx]); });
            
            const filterContainer = document.getElementById('filter-container');
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn px-4 py-2 rounded-full bg-slate-800 text-slate-300 text-sm font-bold border border-slate-700 transition all hover:border-emerald-500';
                btn.innerText = cat;
                btn.onclick = () => filterRecords(cat);
                filterContainer.appendChild(btn);
            });
        }

        function filterRecords(category) {
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText === category) btn.classList.add('active');
            });

            if (category === '全部') {
                renderData(allData);
            } else {
                const catIdx = colMap["分類"];
                const filtered = allData.filter(row => row[catIdx] === category);
                renderData(filtered);
            }
        }

        function renderData(data) {
            const container = document.getElementById('record-container');
            container.innerHTML = '';
            
            const dateIdx = colMap["日期"];
            const nameIdx = colMap["地點/名稱"];
            
            const grouped = {};
            data.forEach(row => {
                let dateStr = row[dateIdx] || ""; 
                if(!dateStr) return;

                dateStr = dateStr.replace(/\./g, '/');
                const year = dateStr.substring(0, 4);
                let mmdd = dateStr.includes('/') ? dateStr.substring(dateStr.indexOf('/') + 1) : dateStr;

                if (!grouped[year]) grouped[year] = [];
                grouped[year].push({ mmdd, name: row[nameIdx] || "未命名", raw: row });
            });

            const sortedYears = Object.keys(grouped).sort((a, b) => b - a);

            sortedYears.forEach(year => {
                const count = grouped[year].length;
                const yearDiv = document.createElement('div');
                yearDiv.innerHTML = `
                    <div class="flex items-center mb-6">
                        <div class="flex items-baseline">
                            <span class="bg-emerald-600 text-white px-4 py-1 rounded-md text-lg font-bold shadow-lg">${year} 年</span>
                            <span class="ml-3 text-slate-500 text-sm font-medium">共 ${count} 筆記錄</span>
                        </div>
                        <div class="flex-grow h-px bg-slate-800 ml-4"></div>
                    </div>
                    <div class="pl-2 space-y-3">
                        ${grouped[year].map(item => `
                            <div class="flex items-start group cursor-pointer hover:bg-slate-800/50 p-3 rounded-xl transition" onclick='showDetail(${JSON.stringify(item.raw).replace(/'/g, "&apos;")})'>
                                <span class="text-slate-700 font-mono mt-1 w-6 shrink-0 group-hover:text-emerald-500 transition">└</span>
                                <div class="flex flex-col sm:flex-row sm:items-center">
                                    <span class="text-emerald-500 font-mono font-bold w-32 shrink-0 tracking-tight">${item.mmdd}</span>
                                    <span class="text-slate-200 font-semibold group-hover:text-white transition">${item.name}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(yearDiv);
            });
        }

        function showDetail(row) {
            const modal = document.getElementById('detail-modal');
            const nameIdx = colMap["地點/名稱"];
            document.getElementById('modal-title').innerText = row[nameIdx];
            
            // 這些是您想要顯示在細項中的標籤與它們在 Google Sheets 裡的精確標題
            const displayFields = [
                { label: '日期', key: '日期' },
                { label: '分類', key: '分類' },
                { label: '人員', key: '人員' },
                { label: '距離', key: '距離' },
                { label: '天數', key: '天數' },
                { label: '備註', key: '備註' },
                { label: 'GPX', key: 'GPX' }
            ];

            let html = `<div class="grid gap-4">`;
            
            displayFields.forEach(field => {
                const idx = colMap[field.key];
                const val = row[idx];
                
                if(val && field.key !== '地點/名稱') {
                    if(field.key === 'GPX' || (val.toString().startsWith('http'))) {
                        html += `
                            <div class="pt-4">
                                <a href="${val}" target="_blank" class="block w-full text-center bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-500 shadow-lg transition">
                                    下載 / 查看 GPX
                                </a>
                            </div>`;
                    } else {
                        html += `
                            <div class="flex border-b border-slate-700 pb-3">
                                <span class="w-20 text-slate-500 shrink-0 font-bold uppercase text-xs mt-1">${field.label}</span>
                                <span class="text-slate-200 ml-2 leading-relaxed">${val}</span>
                            </div>`;
                    }
                }
            });
            html += `</div>`;
            document.getElementById('modal-body').innerHTML = html;
            modal.classList.add('modal-active');
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.remove('modal-active');
        }
    </script>
</body>
</html>
