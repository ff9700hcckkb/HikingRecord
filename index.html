<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiking Logs</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; }
        .modal { display: none; position: fixed; z-index: 50; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-active { display: flex; align-items: center; justify-content: center; }
        .filter-btn.active { background-color: #10b981; color: white; border-color: #10b981; }
        .year-btn.active { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        
        /* 摺疊動畫 */
        .filter-content { transition: all 0.3s ease-in-out; max-height: 0; overflow: hidden; opacity: 0; }
        .filter-content.open { max-height: 500px; opacity: 1; margin-top: 1rem; }

        #back-to-top { position: fixed; bottom: 2rem; right: 1.5rem; display: none; z-index: 40; }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-2xl mx-auto py-8 px-5">
        <header class="mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black text-white">登山記錄</h1>
              //   <p class="text-slate-500 text-sm">個人登山資料庫</p> 
            </div>
            <div id="total-count" class="text-xs text-emerald-500 bg-emerald-500/10 px-2 py-1 rounded border border-emerald-500/20"></div>
        </header>

        <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-4 mb-8">
            <button onclick="toggleFilter()" class="w-full flex justify-between items-center text-slate-300 font-bold">
                <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
                    </svg>
                    <span>篩選條件</span>
                    <span id="active-filter-hint" class="text-xs font-normal text-slate-500 ml-2">全部 / 全部</span>
                </div>
                <svg id="chevron" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>

            <div id="filter-panel" class="filter-content">
                <div class="mb-4">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">年份</label>
                    <div id="year-filter" class="flex flex-wrap gap-2">
                        <button onclick="updateYear('全部', this)" class="year-btn active px-3 py-1 rounded-lg bg-slate-900 text-slate-400 text-xs border border-slate-700 transition-all">全部</button>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">分類</label>
                    <div id="cat-filter" class="flex flex-wrap gap-2">
                        <button onclick="updateCat('全部', this)" class="filter-btn active px-3 py-1 rounded-lg bg-slate-900 text-slate-400 text-xs border border-slate-700 transition-all">全部</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="loading" class="text-center py-20 text-slate-600 animate-pulse text-sm italic">讀取中...</div>
        <div id="record-container" class="space-y-10"></div>
    </div>

    <button id="back-to-top" onclick="scrollToTop()" class="bg-emerald-600 text-white p-3 rounded-full shadow-lg shadow-emerald-900/40">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7" />
        </svg>
    </button>

    <div id="detail-modal" class="modal p-4" onclick="closeModal()">
        <div class="bg-slate-800 rounded-3xl max-w-md w-full p-6 shadow-2xl relative border border-slate-700" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-500 hover:text-white text-2xl">&times;</button>
            <h2 id="modal-title" class="text-xl font-bold text-emerald-400 border-b border-slate-700 pb-4 mb-4"></h2>
            <div id="modal-body" class="space-y-4 text-sm"></div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRssVI_ETyZAWp_ZzR6NSQr49bPhLajgVl83G1PWP2Ytb7axuYZQEtNf9NgpfJijFRQfdauQnulc0fS/pub?output=csv';
        let allProcessedData = []; 
        let currentYear = '全部';
        let currentCat = '全部';
        let colMap = {};

        Papa.parse(csvUrl, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                if (results.data.length === 0) return;
                results.data[0].forEach((col, i) => { if (col) colMap[col.trim()] = i; });

                const dateIdx = getIdx("日期"), catIdx = getIdx("分類"), routeIdx = getIdx("路線");

                allProcessedData = results.data.slice(1).map(row => {
                    let d = row[dateIdx] ? row[dateIdx].toString().trim().replace(/\./g, '/') : "";
                    return {
                        year: d.substring(0, 4),
                        mmdd: d.includes('/') ? d.substring(d.indexOf('/') + 1) : d,
                        category: row[catIdx] ? row[catIdx].trim() : "未分類",
                        name: row[routeIdx] || "未命名行程",
                        raw: row
                    };
                }).filter(item => item.year.length === 4);

                initFilterButtons();
                applyFilters();
                document.getElementById('loading').remove();
                document.getElementById('total-count').innerText = `總計 ${allProcessedData.length} 趟行程`;
            }
        });

        function toggleFilter() {
            const panel = document.getElementById('filter-panel');
            const chevron = document.getElementById('chevron');
            panel.classList.toggle('open');
            chevron.style.transform = panel.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function updateYear(y, el) {
            currentYear = y;
            document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            updateHint();
            applyFilters();
        }

        function updateCat(c, el) {
            currentCat = c;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            updateHint();
            applyFilters();
        }

        function updateHint() {
            document.getElementById('active-filter-hint').innerText = `${currentYear} / ${currentCat}`;
        }

        function applyFilters() {
            let filtered = allProcessedData;
            if (currentYear !== '全部') filtered = filtered.filter(d => d.year === currentYear);
            if (currentCat !== '全部') filtered = filtered.filter(d => d.category === currentCat);
            renderData(filtered);
        }

        // --- 以下維持原有邏輯，僅微調樣式 ---
        window.onscroll = () => {
            const btn = document.getElementById("back-to-top");
            btn.style.display = (window.scrollY > 300) ? "block" : "none";
        };
        const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });
        const getIdx = (k) => colMap[k] !== undefined ? colMap[k] : colMap[Object.keys(colMap).find(x => x.includes(k))];

        function initFilterButtons() {
            const years = [...new Set(allProcessedData.map(d => d.year))].sort((a, b) => b - a);
            const cats = [...new Set(allProcessedData.map(d => d.category))];
            const yc = document.getElementById('year-filter'), cc = document.getElementById('cat-filter');
            years.forEach(y => {
                const b = document.createElement('button');
                b.className = 'year-btn px-3 py-1 rounded-lg bg-slate-900 text-slate-400 text-xs border border-slate-700 transition-all';
                b.innerText = y; b.onclick = (e) => updateYear(y, e.target); yc.appendChild(b);
            });
            cats.forEach(c => {
                const b = document.createElement('button');
                b.className = 'filter-btn px-3 py-1 rounded-lg bg-slate-900 text-slate-400 text-xs border border-slate-700 transition-all';
                b.innerText = c; b.onclick = (e) => updateCat(c, e.target); cc.appendChild(b);
            });
        }

        function renderData(data) {
            const container = document.getElementById('record-container');
            container.innerHTML = '';
            const grouped = {};
            data.forEach(item => {
                if (!grouped[item.year]) grouped[item.year] = [];
                grouped[item.year].push(item);
            });
            const sortedYears = Object.keys(grouped).sort((a, b) => b - a);
            if(sortedYears.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-600 py-10">找不到記錄</div>';
                return;
            }
            sortedYears.forEach(year => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="flex items-center mb-4">
                        <span class="bg-blue-600/20 text-blue-400 px-3 py-1 rounded-lg text-sm font-bold border border-blue-600/30">${year}</span>
                        <div class="flex-grow h-px bg-slate-800 ml-4"></div>
                        <span class="ml-4 text-slate-600 text-xs">${grouped[year].length} 筆</span>
                    </div>
                    <div class="space-y-1">
                        ${grouped[year].map(item => `
                            <div class="flex items-center group cursor-pointer hover:bg-slate-800/30 p-3 rounded-xl transition" onclick='showDetail(${JSON.stringify(item.raw).replace(/'/g, "&apos;")})'>
                                <span class="text-emerald-500 font-mono font-bold w-24 shrink-0 text-sm">${item.mmdd}</span>
                                <span class="text-slate-200 text-sm font-medium group-hover:text-white truncate">${item.name}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function showDetail(row) {
            const modal = document.getElementById('detail-modal');
            document.getElementById('modal-title').innerText = row[getIdx("路線")] || "行程詳情";
            const fields = [{l:'日期',k:'日期'},{l:'分類',k:'分類'},{l:'人員',k:'人員'},{l:'距離',k:'距離'},{l:'天數',k:'天數'},{l:'備註',k:'備註'},{l:'GPX',k:'GPX'}];
            let html = `<div class="grid gap-3">`;
            fields.forEach(f => {
                const val = row[getIdx(f.k)];
                if(val && f.k !== '路線') {
                    if(val.toString().includes('http')) {
                        html += `<div class="pt-2"><a href="${val}" target="_blank" class="block w-full text-center bg-emerald-600 text-white font-bold py-3 rounded-xl text-sm">查看 GPX</a></div>`;
                    } else {
                        html += `<div class="flex border-b border-slate-700/50 pb-2"><span class="w-16 text-slate-500 shrink-0 font-bold text-xs">${f.l}</span><span class="text-slate-300 ml-2 leading-relaxed">${val}</span></div>`;
                    }
                }
            });
            html += `</div>`;
            document.getElementById('modal-body').innerHTML = html;
            modal.classList.add('modal-active');
        }
        function closeModal() { document.getElementById('detail-modal').classList.remove('modal-active'); }
    </script>
</body>
</html>
