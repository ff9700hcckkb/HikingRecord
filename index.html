<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiking Logs</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; }
        .modal { display: none; position: fixed; z-index: 50; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-active { display: flex; align-items: center; justify-content: center; }
        .filter-btn.active { background-color: #10b981; color: white; border-color: #10b981; }
        .year-btn.active { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        .filter-content { transition: all 0.3s ease-in-out; max-height: 0; overflow: hidden; opacity: 0; }
        .filter-content.open { max-height: 800px; opacity: 1; margin-top: 1rem; }
        #back-to-top { position: fixed; bottom: 2rem; right: 1.5rem; display: none; z-index: 40; }
        input[type="search"]::-webkit-search-cancel-button { -webkit-appearance: none; }
    </style>
</head>
<body class="font-sans antialiased text-[16px]"> <div class="max-w-2xl mx-auto py-8 px-5">
        <header class="mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-black text-white leading-none">登山記錄</h1>
                <p class="text-slate-500 text-base mt-2"></p>
            </div>
            <div id="total-count" class="text-xs font-bold text-emerald-500 bg-emerald-500/10 px-2 py-1 rounded border border-emerald-500/20 uppercase">Loading...</div>
        </header>

        <div class="bg-slate-800/40 border border-slate-700/60 rounded-2xl p-4 mb-8 shadow-xl">
            <div class="relative mb-5">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <input type="search" id="keyword-search" oninput="handleSearch()" 
                    class="block w-full pl-11 pr-10 py-3 bg-slate-900/80 border border-slate-700 rounded-xl text-base text-white placeholder-slate-500 focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-all outline-none" 
                    placeholder="搜尋路線、人員或關鍵字...">
                <button id="clear-search" onclick="clearSearch()" class="hidden absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-white">
                    <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>
                </button>
            </div>

            <button onclick="toggleFilter()" class="w-full flex justify-between items-center text-slate-400 font-bold text-base hover:text-slate-200 transition-colors">
                <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>
                    <span>進階條件篩選</span>
                    <span id="active-filter-hint" class="text-xs font-normal text-slate-600 ml-2">全部 / 全部</span>
                </div>
                <svg id="chevron" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
            </button>

            <div id="filter-panel" class="filter-content">
                <div class="pt-5 space-y-5 border-t border-slate-700/50 mt-5">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3 block">年份</label>
                        <div id="year-filter" class="flex flex-wrap gap-2">
                            <button onclick="updateYear('全部', this)" class="year-btn active px-4 py-2 rounded-lg bg-slate-900 text-slate-400 text-sm border border-slate-700 transition-all">全部</button>
                        </div>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3 block">分類</label>
                        <div id="cat-filter" class="flex flex-wrap gap-2">
                            <button onclick="updateCat('全部', this)" class="filter-btn active px-4 py-2 rounded-lg bg-slate-900 text-slate-400 text-sm border border-slate-700 transition-all">全部</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="record-container" class="space-y-12"></div>
    </div>

    <button id="back-to-top" onclick="scrollToTop()" class="bg-emerald-600 text-white p-4 rounded-full shadow-lg shadow-emerald-900/40 border border-emerald-400/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7" /></svg>
    </button>

    <div id="detail-modal" class="modal p-4" onclick="closeModal()">
        <div class="bg-slate-800 rounded-3xl max-w-md w-full p-8 shadow-2xl relative border border-slate-700" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-5 right-5 text-slate-500 hover:text-white text-3xl">&times;</button>
            <h2 id="modal-title" class="text-2xl font-bold text-emerald-400 border-b border-slate-700 pb-5 mb-5"></h2>
            <div id="modal-body" class="space-y-5 text-base"></div> </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRssVI_ETyZAWp_ZzR6NSQr49bPhLajgVl83G1PWP2Ytb7axuYZQEtNf9NgpfJijFRQfdauQnulc0fS/pub?output=csv';
        let allProcessedData = []; 
        let currentYear = '全部';
        let currentCat = '全部';
        let searchKeyword = '';
        let colMap = {};

        Papa.parse(csvUrl, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                if (results.data.length === 0) return;
                results.data[0].forEach((col, i) => { if (col) colMap[col.trim()] = i; });
                const dateIdx = getIdx("日期"), catIdx = getIdx("分類"), routeIdx = getIdx("路線"), distIdx = getIdx("距離");
                allProcessedData = results.data.slice(1).map(row => {
                    let d = row[dateIdx] ? row[dateIdx].toString().trim().replace(/\./g, '/') : "";
                    const isFuture = row[distIdx] && row[distIdx].toString().includes("未確定");
                    return {
                        year: d.substring(0, 4),
                        mmdd: d.includes('/') ? d.substring(d.indexOf('/') + 1) : d,
                        category: row[catIdx] ? row[catIdx].trim() : "未分類",
                        name: row[routeIdx] || "未命名行程",
                        isFuture: isFuture,
                        searchString: row.join('|').toLowerCase(),
                        raw: row
                    };
                }).filter(item => item.year.length === 4);
                initFilterButtons();
                applyFilters();
                updateTotalCount(allProcessedData.length);
            }
        });

     function renderData(data) {
            const container = document.getElementById('record-container');
            container.innerHTML = '';
            const grouped = {};
            data.forEach(item => {
                if (!grouped[item.year]) grouped[item.year] = [];
                grouped[item.year].push(item);
            });
            const sortedYears = Object.keys(grouped).sort((a, b) => b - a);
            if(sortedYears.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-600 py-10 text-base italic">找不到符合條件的記錄</div>';
                return;
            }
            sortedYears.forEach(year => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="flex items-center mb-5">
                        <span class="bg-blue-600 text-white px-3 py-1 rounded-md text-xs font-black uppercase tracking-widest shadow-md">${year}</span>
                        <div class="flex-grow h-px bg-slate-800 ml-4"></div>
                    </div>
                    <div class="space-y-1">
                        ${grouped[year].map(item => `
                            <div class="flex items-center group cursor-pointer hover:bg-slate-800/40 p-4 rounded-2xl transition" onclick='showDetail(${JSON.stringify(item.raw).replace(/'/g, "&apos;")})'>
                                <span class="text-emerald-500 font-mono font-bold w-20 shrink-0 text-sm tracking-tight">${item.mmdd}</span>
                                <span class="text-base font-bold truncate flex-grow" style="color: ${item.isFuture ? '#FFAF60' : '#f8fafc'};">
                                    ${item.name} 
                                    ${item.isFuture ? '<span class="text-xs font-normal opacity-60 ml-2">(規劃中)</span>' : ''}
                                </span>
                                <svg class="h-4 w-4 text-slate-700 group-hover:text-emerald-500 transition ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function handleSearch() {
            const input = document.getElementById('keyword-search');
            const clearBtn = document.getElementById('clear-search');
            searchKeyword = input.value.toLowerCase().trim();
            clearBtn.classList.toggle('hidden', searchKeyword === '');
            applyFilters();
        }
        function clearSearch() { document.getElementById('keyword-search').value = ''; handleSearch(); }
        function applyFilters() {
            let filtered = allProcessedData;
            if (currentYear !== '全部') filtered = filtered.filter(d => d.year === currentYear);
            if (currentCat !== '全部') filtered = filtered.filter(d => d.category === currentCat);
            if (searchKeyword !== '') filtered = filtered.filter(d => d.searchString.includes(searchKeyword));
            renderData(filtered);
            updateTotalCount(filtered.length);
        }
        function updateTotalCount(count) { document.getElementById('total-count').innerText = `找到 ${count} 筆記錄`; }
        function toggleFilter() {
            const panel = document.getElementById('filter-panel');
            const chevron = document.getElementById('chevron');
            panel.classList.toggle('open');
            chevron.style.transform = panel.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
        }
        function updateYear(y, el) {
            currentYear = y;
            document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active'); updateHint(); applyFilters();
        }
        function updateCat(c, el) {
            currentCat = c;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active'); updateHint(); applyFilters();
        }
        function updateHint() { document.getElementById('active-filter-hint').innerText = `${currentYear} / ${currentCat}`; }
        const getIdx = (k) => colMap[k] !== undefined ? colMap[k] : colMap[Object.keys(colMap).find(x => x.includes(k))];
        function initFilterButtons() {
            const years = [...new Set(allProcessedData.map(d => d.year))].sort((a, b) => b - a);
            const cats = [...new Set(allProcessedData.map(d => d.category))];
            const yc = document.getElementById('year-filter'), cc = document.getElementById('cat-filter');
            years.forEach(y => {
                const b = document.createElement('button');
                b.className = 'year-btn px-4 py-2 rounded-lg bg-slate-900 text-slate-400 text-sm border border-slate-700 transition-all';
                b.innerText = y; b.onclick = (e) => updateYear(y, e.target); yc.appendChild(b);
            });
            cats.forEach(c => {
                const b = document.createElement('button');
                b.className = 'filter-btn px-4 py-2 rounded-lg bg-slate-900 text-slate-400 text-sm border border-slate-700 transition-all';
                b.innerText = c; b.onclick = (e) => updateCat(c, e.target); cc.appendChild(b);
            });
        }
       function showDetail(row) {
            const modal = document.getElementById('detail-modal');
            document.getElementById('modal-title').innerText = row[getIdx("路線")] || "行程詳情";
            
            const fields = [
                {l:'日期', k:'日期'},
                {l:'分類', k:'分類'},
                {l:'人員', k:'人員'},
                {l:'距離', k:'距離'},
                {l:'天數', k:'天數'},
                {l:'備註', k:'備註'},
                {l:'GPX', k:'GPX'}
            ];

            let html = `<div class="grid gap-4">`;
            fields.forEach(f => {
                const val = row[getIdx(f.k)];
                if(val && f.k !== '路線') {
                    if(f.k === 'GPX' && val.toString().includes('http')) {
                        html += `<div class="pt-4"><a href="${val}" target="_blank" class="block w-full text-center bg-emerald-600 text-white font-bold py-4 rounded-2xl text-base shadow-lg">查看 GPX 軌跡檔案</a></div>`;
                    } else if(f.k === '分類') {
                        // --- 在詳情頁解析多重標籤 ---
                        const cats = val.toString().split(/[,，\s]+/).filter(c => c);
                        const tagHtml = cats.map(cat => {
                            let colorClass = "border-slate-600 text-slate-400 bg-slate-400/5"; 
                            if(cat.includes("小百岳")) colorClass = "border-emerald-500 text-emerald-500 bg-emerald-500/10";
                            if(cat.includes("縱走")) colorClass = "border-amber-500 text-amber-500 bg-amber-500/10";
                            if(cat.includes("健行")) colorClass = "border-sky-500 text-sky-500 bg-sky-500/10";
                            if(cat.includes("百岳")) colorClass = "border-purple-500 text-purple-500 bg-purple-500/10";
                            return `<span class="px-2 py-0.5 border ${colorClass} text-xs rounded font-bold mr-1.5 mb-1.5 inline-block">${cat}</span>`;
                        }).join('');
                        
                        html += `<div class="flex flex-col border-b border-slate-700/50 pb-3">
                                    <span class="text-slate-500 font-bold text-sm uppercase tracking-wide mb-2">${f.l}</span>
                                    <div class="flex flex-wrap">${tagHtml}</div>
                                 </div>`;
                    } else {
                        html += `<div class="flex border-b border-slate-700/50 pb-3">
                                    <span class="w-20 text-slate-500 shrink-0 font-bold text-sm uppercase tracking-wide">${f.l}</span>
                                    <span class="text-slate-300 ml-2 leading-relaxed text-base">${val}</span>
                                 </div>`;
                    }
                }
            });
            html += `</div>`;
            document.getElementById('modal-body').innerHTML = html;
            modal.classList.add('modal-active');
        }
        window.onscroll = () => { document.getElementById("back-to-top").style.display = (window.scrollY > 300) ? "block" : "none"; };
        const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });
        function closeModal() { document.getElementById('detail-modal').classList.remove('modal-active'); }
    </script>
</body>
</html>
